<!DOCTYPE html>
<html>
<head>
    <title>ERA+ Calculator</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        input, select, button {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
            font-size: 16px;
        }
        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>D1 Baseball ERA+ Calculator</h2>

<label>Your ERA:</label>
<input type="number" id="era" step="0.01" placeholder="Enter ERA">

<label>Select School:</label>
<select id="school">
    <option value="">-- Select --</option>
    <option value="105">LSU (PF 105)</option>
    <option value="98">Oregon State (PF 98)</option>
    <option value="102">Texas (PF 102)</option>
    <option value="95">Wake Forest (PF 95)</option>
</select>

<button onclick="calculateERAPlus()">Calculate ERA+</button>

<div id="result"></div>

<script>
function calculateERAPlus() {
    const era = parseFloat(document.getElementById("era").value);
    const pf = parseFloat(document.getElementById("school").value);
    const leagueERA = 5.42;

    if (!era || !pf) {
        document.getElementById("result").innerHTML = "Please enter ERA and select a school.";
        return;
    }

    const eraPlus = 100 * ((leagueERA * (pf / 100)) / era);
    document.getElementById("result").innerHTML = "Your ERA+ is: " + eraPlus.toFixed(1);
}
</script>

</body>
</html>
